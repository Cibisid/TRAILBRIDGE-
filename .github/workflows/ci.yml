name: TrialBridge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff linter
        run: ruff check backend/

      - name: Run ruff formatter check
        run: ruff format --check backend/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: trialbridge_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          SECRET_KEY: test-secret-key-at-least-32-characters-long
          JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-characters
          POSTGRES_HOST: localhost
          POSTGRES_DB: trialbridge_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/trialbridge_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-key
        run: |
          pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f infra/docker/backend.Dockerfile \
            --target production \
            -t trialbridge-backend:${{ github.sha }} \
            .

      - name: Build frontend image
        run: |
          docker build \
            -f infra/docker/frontend.Dockerfile \
            -t trialbridge-frontend:${{ github.sha }} \
            .
